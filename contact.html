<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Outfit:100,200,300,regular,500,600,700,800,900" rel="stylesheet" />
  <link rel="icon" href="Images/RNL-Logo.jpg" type="image/jpg">
</head>

<body class="flex flex-col min-h-screen bg-white">

  <div class="flex w-screen h-40 p-2 mb-3 items-center justify-between">
    <img src="Images/RNL-Logo.jpg" alt="RNL Logo" class="h-30 p-0.5 mx-2 md:mx-5 my-2">
    <nav class="mx-5 md:mx-15">
      <ul class="flex space-x-4 text-xl font-[Outfit]">
        <li><a href="index.html" class="text-gray-700 hover:text-gray-900">Portfolio</a></li>
        <li><a href="contact.html" class="text-gray-900 underline">Contact</a></li>
      </ul>
    </nav>
  </div>

  <main class="grow w-[65%] mx-auto font-[Outfit] p-5">

    <form class="flex flex-col" action="https://formspree.io/f/xeepqnky" method="POST">
      <h1 class="text-4xl">Contact Me:</h1>

      <div id="Name" class="my-3.5 flex flex-col md:flex-row">
        <div class="p-0.5 flex flex-col mr-0 md:mr-2">
          <label for="first-name">
            First name <span class="ml-2.5 text-sm text-gray-700">(required)</span>
          </label>
          <input type="text" id="first-name" name="first-name" required
            class="p-2 border border-black">
        </div>

        <div class="p-0.5 flex flex-col">
          <label for="last-name">
            Last name <span class="ml-2.5 text-sm text-gray-700">(required)</span>
          </label>
          <input type="text" id="last-name" name="last-name" required
            class="p-2 border border-black">
        </div>
      </div>

      <div id="Email" class="my-3.5 flex flex-col">
        <label for="email">
          Email <span class="ml-2.5 text-sm text-gray-700">(required)</span>
        </label>
        <input type="email" id="email" name="email" required
          class="p-2 border border-black">
      </div>

      <div id="Message" class="my-3.5 flex flex-col">
        <label for="message">
          Message <span class="ml-2.5 text-sm text-gray-700">(required)</span>
        </label>
        <textarea id="message" name="message" rows="5" required
          class="p-2 border border-black"></textarea>
      </div>

      <button type="submit"
        class="bg-gray-700 text-white px-4 py-2 mt-3 self-start hover:bg-gray-900 cursor-pointer transition duration-150">
        Submit
      </button>
    </form>

  </main>

  <footer class="mt-3 h-40 w-screen flex items-center justify-center">
    <img src="Images/RNL-Logo.jpg" alt="RNL Logo" class="h-30 p-0.5 mx-5 my-2">
  </footer>

</body>
</html>
